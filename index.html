<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="color-scheme" content="dark" />
        <title>Profile</title>

        <style>
            :root {
                --bg: #0b0d10;
                --fg: #e6e8eb;
                --muted: #9aa1ab;
                --line: #1b1f26;
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
            }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--fg);
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    "Liberation Mono", "Courier New", monospace;
                letter-spacing: 0.02em;
            }
            main {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 18px;
            }
            .card {
                position: relative;
                width: min(720px, 100%);
                border: 1px solid var(--line);
                padding: 28px 26px;
                background: rgba(255, 255, 255, 0.01);
            }

            .header {
                margin-bottom: 18px;
                padding-bottom: 14px;
                border-bottom: 1px solid var(--line);

                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 16px;
            }

            .header-text {
                display: flex;
                flex-direction: column;
            }

            .tag {
                font-size: 12px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.18em;
            }

            /* resume-style photo */
            .photo {
                width: 72px;
                height: 96px;
                object-fit: cover;
                border: 1px solid var(--line);
                background: #000;
                opacity: 0.9;
                filter: grayscale(100%) contrast(1.05);
                flex-shrink: 0;
            }

            h1 {
                margin: 15px 0 0;
                font-size: 25px;
                font-weight: 600;
            }
            p {
                margin: 0 0 12px 0;
                color: var(--muted);
                font-size: 14px;
                line-height: 1.7;
            }
            .mono {
                margin-top: 16px;
                padding-top: 14px;
                border-top: 1px solid var(--line);
                font-size: 14px;
                line-height: 1.7;
                color: var(--fg);
            }
            .footer {
                margin-top: 18px;
                padding-top: 14px;
                border-top: 1px solid var(--line);
                font-size: 12px;
                color: var(--muted);
                display: flex;
                justify-content: space-between;
            }
        </style>
    </head>

    <body>
        <main>
            <section class="card" aria-label="Minimal profile">
                <div class="header">
                    <div class="header-text">
                        <div class="tag">Profile</div>
                        <h1>Maekawa</h1>
                    </div>

                    <!-- resume-style profile image -->
                    <img src="profile.jpg" alt="profile photo" class="photo" />
                </div>

                <p>
                    I focus on cybersecurity, with an interest in how systems
                    behave, fail, and are protected.
                </p>

                <p>Assembly language is part of my current focus.</p>

                <div class="mono">
                    Not obsessed with winning, but focused on not losing.<br />
                    Have fun.
                </div>

                <div class="footer">
                    <span>v1.1</span>
                    <span id="year">—</span>
                </div>
            </section>
        </main>

        <script>
            document.getElementById("year").textContent =
                new Date().getUTCFullYear();
        </script>
    </body>
</html>
